# 本地开发配置。
# 业务意图：数据库凭据只能通过环境变量注入，禁止提交真实账号或密码。

spring:
  datasource:
    url: ${HANZI_DB_URL:jdbc:mysql://localhost:3306/hanzi_writing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${HANZI_DB_USERNAME}
    password: ${HANZI_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
