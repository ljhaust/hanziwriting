server:
  port: 8080

spring:
  application:
    name: hanzi-writing-platform
  profiles:
    active: local
  jackson:
    property-naming-strategy: SNAKE_CASE
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

app:
  cors:
    allowed-origins: ${HANZI_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
